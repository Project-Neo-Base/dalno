<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stay Dalno Booking Calendar</title>
<style>
:root { color-scheme: dark; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;
  background:#1a1a1a; color:#e8e8e8;
  max-width:360px; margin:0 auto;
  height:100vh; height:-webkit-fill-available;
  display:flex; flex-direction:column;
  overflow:hidden;
}

/* ── Header ── */
header{
  background:#1a1a1a;
  padding:12px 14px 10px;
  flex-shrink:0;
  border-bottom:1px solid #2e2e2e;
}
.hd-row{ display:flex; align-items:stretch; gap:10px; }
.btn-gear{
  border:1.5px solid #2D5016; border-radius:8px;
  background:none; color:#6a9a40; font-size:20px;
  display:flex; align-items:center; justify-content:center;
  padding:0 10px; cursor:pointer; flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.btn-gear:active{ background:#1e2e10; color:#c8e6a0; }
.hd-title{
  flex:1; border:1.5px solid #2D5016;
  border-radius:8px; padding:9px 13px;
}
.hd-name{ font-size:14px; font-weight:700; color:#c8e6a0; line-height:1.45; }
.hd-sub { font-size:10px; color:#6a9a40; margin-top:2px; letter-spacing:.5px; }
.hd-month{
  border:1.5px solid #2D5016; border-radius:8px;
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 8px; min-width:90px; gap:4px;
}
.hd-mo-arr{
  background:none; border:none; color:#6a9a40;
  font-size:18px; cursor:pointer; padding:0 2px; line-height:1;
  -webkit-tap-highlight-color:transparent;
}
.hd-mo-arr:active{ color:#c8e6a0; }
#hd-mo-num{ font-size:30px; font-weight:800; color:#c8e6a0; line-height:1; }

/* ── Year bar ── */
.yr-bar{
  text-align:center; padding:5px 0 3px;
  font-size:11px; color:#555; background:#1a1a1a;
  letter-spacing:.5px;
}

/* ── Legend ── */
.legend{
  display:flex; flex-wrap:wrap; gap:5px 12px;
  padding:7px 14px; background:#1f1f1f;
  border-bottom:1px solid #2a2a2a;
}
.leg{ display:flex; align-items:center; gap:4px; font-size:10px; color:#888; }
.leg-dot{ width:10px; height:10px; border-radius:2px; flex-shrink:0; }

/* ── Calendar ── */
.cal-wrap{
  touch-action:pan-y; user-select:none;
  flex-shrink:0; overflow:hidden;
  transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1);
}
.weekdays{
  display:grid; grid-template-columns:repeat(7,1fr);
  background:#1f1f1f; border-bottom:1px solid #2a2a2a;
}
.weekdays div{
  text-align:center; padding:7px 0;
  font-size:11px; font-weight:700; color:#666;
}
.weekdays div:first-child{ color:#c05060; }
.weekdays div:last-child{ color:#4a7ec8; }

/* ── Week / Cell ── */
.week{ border-bottom:1px solid #252525; }
.week-dates{
  display:grid; grid-template-columns:repeat(7,1fr);
  width:100%;
}
.dcell{
  border-right:1px solid #252525;
  padding:5px 2px 3px;
  text-align:center;
  cursor:pointer;
  min-height:34px;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.dcell:last-child{ border-right:none; }
.dcell:active{ background:#222; }

/* ── Date number ── */
.dnum{
  display:inline-block;
  font-size:13px; font-weight:500;
  width:24px; height:24px;
  line-height:24px; text-align:center;
  border-radius:50%;
  color:#d8d8d8;
}
/* 일요일·공휴일 = 빨강 */
.dcell.red   .dnum { color:#d06070; }
/* 토요일 = 파랑 */
.dcell.sat   .dnum { color:#4a7ec8; }
/* 다른 달 = 어둡게 */
.dcell.other .dnum { color:#383838; }
/* 오늘 */
.dcell.today .dnum { background:#2D5016; color:#c8e6a0; font-weight:700; }
/* 선택 */
.dcell.sel   .dnum { background:#3a6518; color:#fff; }
/* 공휴일 + 오늘 우선 */
.dcell.today.red .dnum { background:#8B1A2A; color:#ffaaaa; }

/* ── Bars ── */
.week-bars{ position:relative; overflow:hidden; }
.bar{
  position:absolute; height:15px; border-radius:3px;
  font-size:9px; line-height:15px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  padding:0 4px; color:#fff; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.bar:active{ filter:brightness(1.3); }

/* ── 컴팩트 모드 ── */
.cal-wrap.compact{ max-height:220px !important; }
.compact .dcell{ height:22px !important; min-height:22px !important; padding:2px 1px 0 !important; overflow:hidden; }
.compact .dnum{ font-size:11px !important; width:18px !important; height:18px !important; line-height:18px !important; }
.compact .week-bars{ max-height:4px !important; overflow:hidden !important; }
.compact .bar{ height:4px !important; top:0 !important; border-radius:1px !important; padding:0 !important; }
.compact .yr-bar{ padding:2px 0 !important; font-size:10px !important; }

/* ── 하단 날짜 패널 ── */
#day-panel{
  flex:1; min-height:0;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  background:#1a1a1a;
  border-top:1px solid #272727;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s ease 0.15s;
}
#day-panel.open{ opacity:1; pointer-events:auto; }
.day-panel-inner{ padding:6px 16px 90px; }
/* ── 월 통계 ── */
.stat-wrap{ padding:14px 16px 20px; margin:10px 14px; border:1.5px solid #2D5016; border-radius:12px; }
.stat-title{ font-size:12px; font-weight:700; color:#c8e6a0; letter-spacing:.5px; margin-bottom:10px; }
.stat-table{ width:100%; border-collapse:collapse; font-size:13px; }
.stat-table th{ color:#555; font-weight:600; padding:4px 6px; text-align:right; font-size:11px; }
.stat-table th:first-child{ text-align:left; }
.stat-table td{ padding:5px 6px; text-align:right; color:#bbb; border-top:1px solid #242424; }
.stat-table td:first-child{ text-align:left; color:#888; }
.stat-table tr.stat-total td{ color:#c8e6a0; font-weight:700; border-top:1px solid #333; }
.stat-income{ margin-top:10px; text-align:right; font-size:14px; font-weight:700; color:#c8e6a0; }
.drag-handle{
  width:36px; height:4px; border-radius:2px;
  background:#3a3a3a; margin:10px auto 12px;
}

/* ── Bottom ── */
.spacer{ display:none; }
.btn-block-go{
  width:100%; margin-top:10px; padding:13px; border:none;
  border-radius:10px; background:#2a2a2a; color:#888;
  font-size:13px; cursor:pointer; font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.btn-block-go:active{ background:#333; }

/* ── Overlay / Sheet ── */
.overlay{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.65); z-index:200;
  align-items:flex-end; justify-content:center;
}
.overlay.open{ display:flex; }
.sheet{
  background:#212121; width:100%; max-width:360px;
  border-radius:20px 20px 0 0;
  max-height:88vh; overflow-y:auto;
  padding:0 16px 40px;
  -webkit-overflow-scrolling:touch;
}
.handle{ width:40px; height:4px; background:#444; border-radius:2px; margin:12px auto 14px; }
.sh-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.sh-title{ font-size:17px; font-weight:700; color:#e8e8e8; }
.sh-close{ background:none; border:none; font-size:22px; color:#666; cursor:pointer; }

/* ── Day cards ── */
.day-h1{ font-size:21px; font-weight:700; color:#fff; }
.day-h2{ font-size:12px; color:#666; margin-top:3px; margin-bottom:20px; }

/* ── Room section ── */
.room-sec{ margin-bottom:14px; }
.room-lbl{
  font-size:10px; font-weight:700; color:#555;
  letter-spacing:.8px; margin-bottom:7px;
  text-transform:uppercase;
}
.bcard{
  background:#2a2a2a; border-radius:12px;
  padding:13px 14px 11px; margin-bottom:0;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}
.bcard:active{ background:#323232; }
.bcard-top{ display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.bcard-badge{ padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.bcard-name{ font-size:15px; font-weight:700; color:#e8e8e8; }
.bcard-room{ font-size:12px; color:#666; }
.bcard-meta{ font-size:12px; color:#888; line-height:1.8; }
.btn-empty{
  width:100%; padding:15px; border:1.5px dashed #333;
  border-radius:12px; background:transparent;
  color:#494949; font-size:13px; cursor:pointer;
  font-family:inherit; text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.btn-empty:active{ background:#222; border-color:#444; color:#666; }

/* ── Detail (Naver style) ── */
#ov-det .sheet{
  width:90%; max-width:324px;
  border-left:1px solid #333;
  border-right:1px solid #333;
  border-bottom:1px solid #333;
}
.det-box{
  border-radius:10px;
  background:#000;
  padding:16px 14px 14px;
}
.det-card{
  margin-bottom:18px;
}
.det-card-ch{
  display:inline-block; padding:3px 10px; border-radius:20px;
  font-size:11px; font-weight:700; color:#fff;
  margin-bottom:12px;
}
.det-card-name{
  font-size:22px; font-weight:800; color:#e8e8e8; margin-bottom:2px;
}
.det-card-room{
  font-size:13px; color:#555; margin-bottom:14px;
}
.det-card-row{
  font-size:13px; color:#777;
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-bottom:1px solid #2a2a2a;
}
.det-card-row:last-of-type{ border-bottom:none; }
.det-card-row span:last-child{ font-weight:600; color:#d8d8d8; }
.det-amount{
  font-size:19px; font-weight:800; color:#e8e8e8;
  margin-top:12px; text-align:right;
}
.det-memo-lbl{
  font-size:11px; font-weight:700; color:#666;
  letter-spacing:.4px; margin-bottom:8px; display:block;
}
.det-btns{ display:flex; gap:10px; margin-top:14px; }
.btn-edit{
  flex:1; padding:12px; border:none;
  border-radius:10px; background:#1a2a3a; color:#6aaedc;
  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}
.btn-edit:active{ background:#223344; }
.btn-save{
  flex:1; padding:12px; border:none;
  border-radius:10px; background:#2a3a1a; color:#8ec860;
  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}
.btn-save:active{ background:#344820; }
.btn-del{
  flex:1; padding:12px; border:none;
  border-radius:10px; background:#3a1a1a; color:#cf6679;
  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}
.det-readonly{
  flex:1; padding:12px; border-radius:10px;
  background:#222; color:#444; font-size:12px;
  display:flex; align-items:center; justify-content:center;
}
/* ── 설정 ── */
.cfg-section{ margin-bottom:20px; }
.cfg-lbl{ font-size:11px; font-weight:700; color:#6a9a40; letter-spacing:.5px; margin-bottom:10px; }
.cfg-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.cfg-url-row{ display:flex; align-items:center; gap:6px; margin-bottom:10px; }
.cfg-ch{ padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.cfg-url-input{
  flex:1; border:1px solid #2e2e2e; border-radius:7px;
  padding:6px 8px; font-size:11px; background:#1a1a1a;
  color:#ccc; outline:none; font-family:inherit; min-width:0;
}
.cfg-url-input:focus{ border-color:#3a6020; }
.cfg-file-btn{
  padding:7px 12px; border:1px solid #3a6020; border-radius:8px;
  background:#1e2e10; color:#8ec860; font-size:12px; font-weight:600;
  cursor:pointer; font-family:inherit; flex-shrink:0;
}
.cfg-file-btn:active{ background:#2D5016; }
.cfg-import-status{ font-size:12px; min-height:18px; margin-top:4px; }

/* ── 삭제 확인 모달 ── */
#confirm-modal{
  display:none; position:fixed; inset:0; z-index:400;
  background:rgba(0,0,0,.7);
  align-items:center; justify-content:center;
}
#confirm-modal.open{ display:flex; }
.confirm-box{
  background:#1e1e1e; border:1px solid #333; border-radius:16px;
  padding:28px 24px 20px; width:78%; max-width:280px; text-align:center;
}
.confirm-msg{
  font-size:15px; font-weight:600; color:#e8e8e8; line-height:1.6;
  margin-bottom:22px;
}
.confirm-btns{ display:flex; gap:10px; }
.confirm-no{
  flex:1; padding:12px; border:none; border-radius:10px;
  background:#2a2a2a; color:#aaa;
  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}
.confirm-yes{
  flex:1; padding:12px; border:none; border-radius:10px;
  background:#3a1a1a; color:#cf6679;
  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}

/* ── Form ── */
.fg{ margin-bottom:10px; }
.fl{ font-size:10px; font-weight:700; color:#666; display:block; margin-bottom:5px; letter-spacing:.4px; }
.req{ color:#5a9030; margin-right:2px; }
.fi{
  width:100%; border:1px solid #2e2e2e; border-radius:6px;
  padding:5px 8px; font-size:13px; outline:none;
  color:#d8d8d8; background:#242424; font-family:inherit; color-scheme:dark;
}
.fi:focus{ border-color:#3a6020; }
textarea.fi{ resize:none; min-height:50px; }
.segs{ display:flex; gap:5px; }
.seg{
  flex:1; padding:5px 4px; border:1px solid #2e2e2e;
  border-radius:6px; font-size:12px;
  background:#242424; cursor:pointer;
  text-align:center; color:#666; font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.seg.on{ border-color:#3a6020; background:#2D5016; color:#c8e6a0; font-weight:700; }
.seg:active{ opacity:.8; }
/* 날짜 행 */
.date-row{ display:flex; align-items:center; gap:6px; }
.date-box{ flex:1; }
.date-arr{ color:#555; font-size:16px; flex-shrink:0; }
.nights-txt{ text-align:center; font-size:11px; color:#5a9030; margin-top:4px; font-weight:700; min-height:15px; letter-spacing:.3px; }
/* 인원 */
.cnt-row{ display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid #262626; }
.cnt-row:last-child{ border-bottom:none; }
.cnt-info{ display:flex; flex-direction:column; gap:1px; }
.cnt-lbl{ font-size:13px; color:#ccc; }
.cnt-sub{ font-size:10px; color:#555; }
.cnt-ctrl{ display:flex; align-items:center; gap:10px; }
.cnt-btn{
  width:28px; height:28px; border-radius:50%;
  border:1.5px solid #3a3a3a; background:#242424;
  color:#5a9030; font-size:17px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:inherit; line-height:1;
  -webkit-tap-highlight-color:transparent;
}
.cnt-btn:active{ background:#2D5016; border-color:#2D5016; color:#c8e6a0; }
.cnt-v{ width:22px; text-align:center; font-size:14px; font-weight:700; color:#d8d8d8; }
/* 캘린더 미리보기 */
.preview-wrap{ background:#202020; border-radius:8px; padding:7px 10px; margin-bottom:10px; }
.preview-lbl{ font-size:10px; color:#444; margin-bottom:5px; letter-spacing:.5px; }
.preview-bar-inner{ border-radius:4px; display:inline-block; padding:3px 8px; font-size:11px; color:#fff; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
/* 구분선 */
.divider-lbl{
  font-size:10px; color:#3a3a3a; text-align:center;
  margin:2px 0 10px; letter-spacing:.5px;
  display:flex; align-items:center; gap:8px;
}
.divider-lbl::before,.divider-lbl::after{ content:''; flex:1; height:1px; background:#262626; }
/* 버튼 */
.btn-submit{
  width:100%; margin-top:4px; padding:11px; border:none;
  border-radius:9px; background:#2D5016; color:#c8e6a0;
  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.btn-submit:active{ opacity:.85; }
.btn-naver-block{
  width:100%; margin-top:6px; padding:10px; border:1.5px solid #2e2e2e;
  border-radius:9px; background:transparent; color:#555;
  font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.btn-naver-block:active{ background:#1e1e1e; color:#6a9a40; border-color:#3a6020; }
/* ── FAB ── */
.fab{
  position:fixed; bottom:24px; right:calc(50% - 166px);
  width:52px; height:52px; border-radius:50%;
  background:#2D5016; border:none;
  color:#c8e6a0; font-size:28px; line-height:1;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  cursor:pointer; z-index:90;
  display:flex; align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.fab:active{ background:#3a6520; transform:scale(.93); }
/* 폼 헤더 */
.sh-head-form{ display:flex; align-items:center; gap:10px; margin-bottom:22px; }
.btn-back{
  display:flex; align-items:center; gap:5px;
  background:none; border:none; color:#888; cursor:pointer;
  font-size:13px; font-weight:600; padding:0; line-height:1;
  -webkit-tap-highlight-color:transparent;
}
.btn-back-arrow{ font-size:20px; line-height:1; }

/* ── 날짜 범위 버튼 ── */
.date-pick-btn{
  width:100%; padding:11px 13px;
  border:1.5px solid #2e2e2e; border-radius:10px;
  background:#242424; color:#d8d8d8; font-size:14px;
  display:flex; justify-content:space-between; align-items:center;
  cursor:pointer; font-family:inherit; text-align:left;
  -webkit-tap-highlight-color:transparent;
}
.date-pick-btn:active{ border-color:#3a6020; }
.dp-cal-icon{ font-size:16px; color:#555; }

/* ── 날짜 범위 피커 오버레이 ── */
.dp-head{ display:flex; align-items:center; justify-content:space-between; padding:4px 4px 14px; }
.dp-mo-lbl{ font-size:15px; font-weight:700; color:#d8d8d8; }
.dp-nav{ background:none; border:none; font-size:24px; color:#777; cursor:pointer; padding:4px 10px; -webkit-tap-highlight-color:transparent; }
.dp-grid{ display:grid; grid-template-columns:repeat(7,1fr); }
.dp-wdh{ text-align:center; padding:6px 0; font-size:11px; font-weight:700; color:#555; }
.dp-wdh:first-child{ color:#c05060; }
.dp-wdh:last-child{ color:#4a7ec8; }
.dp-cell{ text-align:center; padding:3px 0; cursor:pointer; position:relative; -webkit-tap-highlight-color:transparent; }
.dp-num{ display:inline-block; width:30px; height:30px; line-height:30px; border-radius:50%; font-size:13px; font-weight:500; color:#d8d8d8; position:relative; z-index:1; }
.dp-cell.other .dp-num{ color:#383838; pointer-events:none; }
.dp-cell.dp-today .dp-num{ color:#5a9030; font-weight:700; }
.dp-cell.dp-start .dp-num,
.dp-cell.dp-end   .dp-num{ background:#2D5016; color:#c8e6a0; font-weight:700; }
.dp-cell.dp-in-range{ background:rgba(45,80,22,0.28); }
.dp-cell:active .dp-num{ opacity:.7; }
.dp-status{ text-align:center; font-size:12px; color:#5a9030; padding:10px 0 6px; font-weight:600; min-height:34px; }
#dp-cal{ display:grid; grid-template-columns:repeat(7,1fr); }
</style>
</head>
<body>

<header>
  <div class="hd-row">
    <div class="hd-title">
      <div class="hd-name">한옥스테이 달과노니는집</div>
      <div class="hd-sub">Stay Daln o</div>
    </div>
    <div class="hd-month">
      <button class="hd-mo-arr" onclick="prevMo()">&#8249;</button>
      <span id="hd-mo-num">5</span>
      <button class="hd-mo-arr" onclick="nextMo()">&#8250;</button>
    </div>
    <button class="btn-gear" onclick="openOv('ov-cfg')">⚙</button>
  </div>
</header>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#016030"></div>네이버</div>

function toRow(b){

    checkin:b.checkin,checkout:b.checkout,guest_name:b.guestName||'',

    checkin:r.checkin,checkout:r.checkout,guestName:r.guest_name||'',

var data = [];
try{ var _d=JSON.parse(localStorage.getItem('dalno_v1')||'[]'); if(Array.isArray(_d)) data=_d; }catch(e){}

var fs = {room:'1층',ch:'네이버',adults:2,children:0,broom:'1층'};

// ── 렌더 ──────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('hd-mo-num').textContent = mo;
  document.getElementById('yr-bar').textContent    = yr + '년 ' + mo + '월';

  var fd   = new Date(yr, mo-1, 1).getDay();
  var dim  = new Date(yr, mo, 0).getDate();
  var pDim = new Date(yr, mo-1, 0).getDate();
  var today = fmtD(new Date());
  var cells = Math.ceil((fd + dim) / 7) * 7;
  var weekCount = cells / 7;

  // 날짜 메타 미리 계산
  var dateMeta = [];
  for(var i = 0; i < cells; i++){
    var dt, isOther = false;
    if(i < fd){          dt = new Date(yr, mo-2, pDim-fd+i+1); isOther=true; }
    else if(i >= fd+dim){ dt = new Date(yr, mo,   i-fd-dim+1);  isOther=true; }
    else                   dt = new Date(yr, mo-1, i-fd+1);
    dateMeta.push({ dt:dt, ds:fmtD(dt), isOther:isOther, dow:dt.getDay() });
  }

  // HTML 빌드
  var html = '';
  for(var w = 0; w < weekCount; w++){
    html += '<div class="week"><div class="week-dates">';
    for(var d = 0; d < 7; d++){
      var m = dateMeta[w*7+d];
      var cls = 'dcell';
      if(m.isOther){ cls += ' other'; }
      else {
        if(m.dow === 6) cls += ' sat';
        else if(m.dow === 0 || HOLIDAYS[m.ds]) cls += ' red';
        if(m.ds === today) cls += ' today';
      }
      var clickAttr = m.isOther ? '' : ' onclick="openDay(\'' + m.ds + '\')"';
      html += '<div class="' + cls + '"' + clickAttr + '>'
            + '<span class="dnum">' + m.dt.getDate() + '</span>'
            + '</div>';
    }
    html += '</div>'
          + '<div class="week-bars" id="wb' + w + '"></div>'
          + '</div>';
  }
  document.getElementById('cal-body').innerHTML = html;

  // 바 렌더
  for(var w2 = 0; w2 < weekCount; w2++){
    var wStart = new Date(dateMeta[w2*7].ds   + 'T00:00:00');
    var wEnd   = new Date(dateMeta[w2*7+6].ds + 'T00:00:00');
    wEnd.setDate(wEnd.getDate() + 1);
    buildBars(document.getElementById('wb' + w2), wStart, wEnd);
  }

  // 전체 높이 측정 후 max-height 고정 (컴팩트 전환 애니메이션 기준점)
  var cw = document.getElementById('cal-wrap');
  cw.style.maxHeight = '';
  requestAnimationFrame(function(){
    calFullH = cw.scrollHeight;
    cw.style.maxHeight = calFullH + 'px';
  });
}

function buildBars(container, wStart, wEnd){
  if(!container) return;
  var wsStr = fmtD(wStart);
  var weLast = new Date(+wEnd - 1);
  var weStr  = fmtD(weLast);

  var items = [];
  for(var i = 0; i < data.length; i++){
    var b = data[i];
    if(b.checkin <= weStr && b.checkout > wsStr){
      var bS = new Date(b.checkin  + 'T00:00:00');
      var bE = new Date(b.checkout + 'T00:00:00');
      var c1 = Math.max(0, Math.floor((+bS - +wStart) / 86400000));
      var c2 = Math.min(6, Math.floor((+bE - +wStart) / 86400000) - 1);
      if(c2 >= c1) items.push({b:b, c1:c1, c2:c2});
    }
  }
  items.sort(function(a,b){ return a.c1-b.c1 || a.b.room.localeCompare(b.b.room); });

  var lanes = [];
  for(var j = 0; j < items.length; j++){
    var it = items[j];
    var l = 0;
    while(l < lanes.length && lanes[l] >= it.c1) l++;
    lanes[l] = it.c2;
    it.lane = l;
  }

  var H=15, G=2, P=2;
  var maxL = -1;
  for(var k = 0; k < items.length; k++) if(items[k].lane > maxL) maxL = items[k].lane;
  container.style.height = maxL >= 0 ? (P + (maxL+1)*(H+G)) + 'px' : '3px';

  for(var n = 0; n < items.length; n++){
    var it2 = items[n], b2 = it2.b;
    var bar = document.createElement('div');
    bar.className = 'bar';
    var lPct = (it2.c1/7*100).toFixed(2);
    var wPct = ((it2.c2-it2.c1+1)/7*100).toFixed(2);
    bar.style.cssText = 'left:' + lPct + '%;width:calc(' + wPct + '% - 2px);'
      + 'top:' + (P + it2.lane*(H+G)) + 'px;'
      + 'background:' + (CH_COLOR[b2.channel]||'#555') + ';';
    var pax = b2.children > 0 ? b2.adults+','+b2.children : b2.adults;
    bar.textContent = b2.type==='block'
      ? b2.room+' 차단'
      : b2.room+' '+b2.guestName+' '+pax;
    (function(c1, wS){ bar.onclick = function(e){ e.stopPropagation(); var d=new Date(+wS+c1*86400000); openDay(fmtD(d)); }; })(it2.c1, wStart);
    container.appendChild(bar);
  }
}

  var tx = 0;
  var el = document.getElementById('cal-wrap');
  el.addEventListener('touchstart', function(e){ tx = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend',   function(e){
    var dx = e.changedTouches[0].clientX - tx;
    if(Math.abs(dx) > 50){
      mo += dx<0?1:-1;
      if(mo>12){mo=1;yr++;} if(mo<1){mo=12;yr--;}
      selDate=null;
      document.getElementById('cal-wrap').classList.remove('compact');
      document.getElementById('day-panel').classList.remove('open');
      render();
    }
  }, {passive:true});
}

var ROOM_NAMES = {'1층':'1층 위드책쾌','2층':'2층 프리미엄'};

function openDay(ds){
  if(selDate === ds){ closeDay(); return; }

  var html = '<div class="day-h1">' + (dt.getMonth()+1) + '월 ' + dt.getDate() + '일</div>'

  ['1층','2층'].forEach(function(room){

    for(var i=0; i<data.length; i++){
      if(data[i].room===room && data[i].checkin<=ds && ds<data[i].checkout){ b=data[i]; break; }
    }
    html += '<div class="room-sec"><div class="room-lbl">' + ROOM_NAMES[room] + '</div>';

      var name   = b.type==='block' ? '차단' : b.guestName;
      html += '<div class="bcard" onclick="openDet(\''+b.id+'\')">'
            + '<div class="bcard-top">'

            + '</div>'
            + '<div class="bcard-meta">'+b.checkin+' ~ '+b.checkout
            + (b.type!=='block'?' ('+nights+'박)<br>'+pax:'')
            + '</div></div>';
    } else {
      html += '<button class="btn-empty" onclick="openAddRoom(\''+room+'\',\''+ds+'\')">예약없음 — 탭하여 입력</button>';
    }

  html += '<button class="btn-block-go" onclick="openBlock()">네이버 차단하러 가기</button>';

  document.getElementById('day-panel-inner').innerHTML = html;

  var cw = document.getElementById('cal-wrap');

  cw.style.maxHeight = (calFullH || cw.scrollHeight) + 'px';
  cw.classList.add('compact');
  document.getElementById('day-panel').classList.add('open');
}

function closeDay(){
  selDate = null;
  var cw = document.getElementById('cal-wrap');
  cw.classList.remove('compact');
  cw.style.maxHeight = calFullH + 'px';
  document.getElementById('day-panel').classList.remove('open');
  render();
  renderStats();
}

function renderStats(){
  var channels = ['네이버','부킹닷컴','에어비앤비','이체'];
  var nights   = {};
  var chIncome = {};
  channels.forEach(function(ch){ nights[ch]={'1층':0,'2층':0}; chIncome[ch]=0; });

  var y = yr, m = mo;

  data.forEach(function(b){
    if(b.type==='block') return;
    if(!nights[b.channel]) return;
    var ci = new Date(b.checkin+'T00:00:00');
    var co = new Date(b.checkout+'T00:00:00');
    var ms = new Date(y, m-1, 1);
    var me = new Date(y, m, 1);
    var s  = ci < ms ? ms : ci;
    var e  = co < me ? co : me;
    var n  = Math.round((+e - +s)/86400000);
    if(n > 0){
      nights[b.channel][b.room] += n;
      if(b.amount){
        var totalN = Math.round((+co-+ci)/86400000);
        chIncome[b.channel] += Math.round(Number(b.amount) * n / totalN);
      }
    }
  });

  var tot1=0, tot2=0, totIncome=0;
  channels.forEach(function(ch){
    tot1+=nights[ch]['1층']; tot2+=nights[ch]['2층']; totIncome+=chIncome[ch];
  });

  var html = '<div class="stat-wrap">'
           + '<div class="stat-title">' + yr + '년 ' + mo + '월 예약 현황</div>'
           + '<table class="stat-table">'
           + '<thead><tr><th></th><th>1층</th><th>2층</th><th>금액</th></tr></thead><tbody>';
  channels.forEach(function(ch){
    var n1=nights[ch]['1층'], n2=nights[ch]['2층'];
    if(n1+n2===0) return;
    html += '<tr><td style="color:'+(CH_COLOR[ch]||'#888')+'">'+ch+'</td>'
          + '<td>'+(n1?n1+'박':'-')+'</td>'
          + '<td>'+(n2?n2+'박':'-')+'</td>'
          + '<td>'+(chIncome[ch]?chIncome[ch].toLocaleString():'—')+'</td></tr>';
  });
  html += '<tr class="stat-total">'
        + '<td>합계</td><td>'+tot1+'박</td><td>'+tot2+'박</td>'
        + '<td>'+(totIncome?totIncome.toLocaleString():'—')+'</td>'
        + '</tr></tbody></table></div>';

  document.getElementById('day-panel-inner').innerHTML = html;
  document.getElementById('day-panel').classList.add('open');
}

var dpYr=2026, dpMo=5, dpCI=null, dpCO=null;

function openDatePicker(){
  var today=fmtD(new Date());
  dpYr=yr; dpMo=mo;
  dpCI=document.getElementById('a-ci').value||null;
  dpCO=document.getElementById('a-co').value||null;
  renderDp();
  openOv('ov-dp');
}

function dpNav(d){
  dpMo+=d;
  if(dpMo>12){dpMo=1;dpYr++;}
  if(dpMo<1){dpMo=12;dpYr--;}
  renderDp();
}

function renderDp(){
  document.getElementById('dp-mo-lbl').textContent=dpYr+'년 '+dpMo+'월';
  var fd=new Date(dpYr,dpMo-1,1).getDay();
  var dim=new Date(dpYr,dpMo,0).getDate();
  var pDim=new Date(dpYr,dpMo-1,0).getDate();
  var cells=Math.ceil((fd+dim)/7)*7;
  var today=fmtD(new Date());
  var html='';
  for(var i=0;i<cells;i++){
    var dt, isOther=false;
    if(i<fd){ dt=new Date(dpYr,dpMo-2,pDim-fd+i+1); isOther=true; }
    else if(i>=fd+dim){ dt=new Date(dpYr,dpMo,i-fd-dim+1); isOther=true; }
    else dt=new Date(dpYr,dpMo-1,i-fd+1);
    var ds=fmtD(dt);
    var cls='dp-cell';
    if(isOther){ cls+=' other'; }
    else {
      if(ds===today) cls+=' dp-today';
      if(dpCI && ds===dpCI) cls+=' dp-start';
      if(dpCO && ds===dpCO) cls+=' dp-end';
      if(dpCI && dpCO && ds>dpCI && ds<dpCO) cls+=' dp-in-range';
    }
    var onclick=isOther?'':' onclick="dpTap(\''+ds+'\')"';
    html+='<div class="'+cls+'"'+onclick+'><span class="dp-num">'+dt.getDate()+'</span></div>';
  }
  document.getElementById('dp-cal').innerHTML=html;
  var st=document.getElementById('dp-status');
  var btn=document.getElementById('dp-confirm');
  if(!dpCI){ st.textContent='체크인 날짜를 선택하세요'; btn.disabled=true; btn.style.opacity='.4'; }
  else if(!dpCO){ st.textContent=dpCI+' ✓  — 체크아웃을 선택하세요'; btn.disabled=true; btn.style.opacity='.4'; }
  else { st.textContent=dpCI+' → '+dpCO+' · '+Math.round((new Date(dpCO+'T00:00:00')-new Date(dpCI+'T00:00:00'))/86400000)+'박'; btn.disabled=false; btn.style.opacity='1'; }
}

function dpTap(ds){
  if(ds===dpCI){ dpCI=null; dpCO=null; }        // 체크인 탭 → 전체 해제
  else if(ds===dpCO){ dpCO=null; }              // 체크아웃 탭 → 체크아웃만 해제
  else if(!dpCI||ds<dpCI){ dpCI=ds; dpCO=null; } // 새 체크인
  else { dpCO=ds; }                              // 체크아웃 설정
  renderDp();
}

function syncToGist(silent){
  if(!gistToken || !gistId) return;
  var ics = generateIcs();
  var st = document.getElementById('gist-status');
  if(st && !silent){ st.style.color='#888'; st.textContent='동기화 중...'; }
  fetch('https://api.github.com/gists/' + gistId, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + gistToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: { 'dalno.ics': { content: ics } } })
  }).then(function(r){
    if(r.ok && st && !silent){ st.style.color='#5a9030'; st.textContent='동기화 완료 ✓'; }
    else if(!r.ok && st && !silent){ st.style.color='#cf6679'; st.textContent='동기화 실패. 토큰을 확인해주세요.'; }
  }).catch(function(){
    if(st && !silent){ st.style.color='#cf6679'; st.textContent='네트워크 오류.'; }
  });
}

function saveGistToken(){
  var el = document.getElementById('gist-token-input');
  if(!el || !el.value.trim()){ alert('토큰을 입력해주세요.'); return; }
  gistToken = el.value.trim();
  localStorage.setItem('dalno_gist', JSON.stringify({token:gistToken, id:gistId}));
  var st = document.getElementById('gist-status');
  if(st){ st.style.color='#5a9030'; st.textContent='토큰 저장됨. 이제 예약 변경 시 자동 동기화됩니다.'; }
  syncToGist(false);
}

function copyGistUrl(){
  var url = 'https://gist.githubusercontent.com/Project-Neo-Base/' + gistId + '/raw/dalno.ics';
  navigator.clipboard.writeText(url).then(function(){
    var st = document.getElementById('gist-status');
    if(st){ st.style.color='#5a9030'; st.textContent='주소가 복사됐어요!'; }
  });
}

function generateIcs(){
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//StayDalno//KR','CALSCALE:GREGORIAN'];
  data.forEach(function(b){
    var ci=b.checkin.replace(/-/g,''), co=b.checkout.replace(/-/g,'');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+b.id+'@staydalno');
    lines.push('DTSTART;VALUE=DATE:'+ci);
    lines.push('DTEND;VALUE=DATE:'+co);
    lines.push('SUMMARY:'+(b.type==='block'?'[차단] '+b.room:b.guestName+' ('+b.room+')'));
    if(b.userMemo) lines.push('DESCRIPTION:'+b.userMemo);
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

// ── iCal 가져오기 ─────────────────────────────────────────────────────────────
function parseAndSaveIcal(txt, channel, room){
  var events = txt.split('BEGIN:VEVENT');
  var added = 0;
  for(var i=1; i<events.length; i++){
    var ev2 = events[i];
    var dtstart = (ev2.match(/DTSTART[^:]*:(\d{8})/) || [])[1];
    var dtend   = (ev2.match(/DTEND[^:]*:(\d{8})/)   || [])[1];
    var summary = (ev2.match(/SUMMARY:(.+)/)          || [])[1] || '';
    summary = summary.replace(/\r/g,'').trim();
    if(!dtstart || !dtend) continue;
    var ci = dtstart.slice(0,4)+'-'+dtstart.slice(4,6)+'-'+dtstart.slice(6,8);
    var co = dtend.slice(0,4)+'-'+dtend.slice(4,6)+'-'+dtend.slice(6,8);
    var dup = false;
    for(var j=0;j<data.length;j++){
      if(data[j].channel===channel && data[j].checkin===ci && data[j].checkout===co){ dup=true; break; }
    }
    if(!dup){
      var newIcal={id:'ic'+Date.now()+'_'+i, type:'booking', room:room||'1층',
        channel:channel, checkin:ci, checkout:co,
        guestName:summary||channel, adults:2, children:0,
        phone:'', amount:'', memo:'', userMemo:''};
      data.push(newIcal);
      upsertOne(newIcal);
      added++;
    }
  }
  save(); render(); renderStats();
  var st = document.getElementById('cfg-status');
  st.style.color = added>0 ? '#5a9030' : '#888';
  st.textContent = added>0 ? added+'건 추가됐어요.' : '새 예약이 없어요. (중복 제외)';
}

function importIcalUrl(channel, room, silent){
  var prefix  = channel==='부킹닷컴' ? 'booking' : 'airbnb';
  var suffix  = room==='2층' ? '2' : '1';
  var inputId = 'url-'+prefix+'-'+suffix;
  var urlKey  = prefix+'-'+suffix;
  var el = document.getElementById(inputId);
  var url = el ? el.value.trim() : icalUrls[urlKey];
  if(!url){ if(!silent) alert('URL을 입력해주세요.'); return; }
  icalUrls[urlKey] = url;
  localStorage.setItem('dalno_ical', JSON.stringify(icalUrls));
  startAutoRefresh();
  var st = document.getElementById('cfg-status');
  if(st){ st.style.color='#888'; st.textContent='가져오는 중...'; }
  function tryFetch(urls, idx){
    if(idx >= urls.length){
      if(st){ st.style.color='#cf6679'; st.textContent='가져오기 실패. URL을 확인해주세요.'; }
      return;
    }
    fetch(urls[idx])
      .then(function(r){ if(!r.ok) throw new Error('status '+r.status); return r.text(); })
      .then(function(txt){
        if(txt.indexOf('BEGIN:VCALENDAR') === -1) throw new Error('not ical');
        parseAndSaveIcal(txt, channel, room); updateLastTime();
      })
      .catch(function(){ tryFetch(urls, idx+1); });
  }
  tryFetch([
    url,
    'https://corsproxy.io/?'+encodeURIComponent(url),
    'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
    'https://thingproxy.freeboard.io/fetch/'+url
  ], 0);
}

function updateLastTime(){
  lastUpdated = new Date();
  var st = document.getElementById('cfg-status');
  if(st){ st.style.color='#888'; st.textContent='마지막 업데이트: 방금'; }
}

function autoRefreshAll(){
  if(icalUrls['booking-1']) importIcalUrl('부킹닷컴','1층',true);
  if(icalUrls['booking-2']) importIcalUrl('부킹닷컴','2층',true);
  if(icalUrls['airbnb-1'])  importIcalUrl('에어비앤비','1층',true);
  if(icalUrls['airbnb-2'])  importIcalUrl('에어비앤비','2층',true);
}

function startAutoRefresh(){
  if(autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(autoRefreshAll, 30 * 60 * 1000); // 30분
}

// ── iCal 내보내기 ─────────────────────────────────────────────────────────────
function exportIcal(mode){
  var lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//StayDalno//KR','CALSCALE:GREGORIAN'];
  data.forEach(function(b){
    var ci = b.checkin.replace(/-/g,'');
    var co = b.checkout.replace(/-/g,'');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+b.id+'@staydalno');
    lines.push('DTSTART;VALUE=DATE:'+ci);
    lines.push('DTEND;VALUE=DATE:'+co);
    lines.push('SUMMARY:'+(b.type==='block'?'[차단] '+b.room:b.guestName+' ('+b.room+')'));
    if(b.userMemo) lines.push('DESCRIPTION:'+b.userMemo);
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var ics = lines.join('\r\n');
  if(mode==='copy'){
    navigator.clipboard.writeText(ics).then(function(){
      document.getElementById('cfg-status').textContent = '클립보드에 복사됐어요!';
    });
  } else {
    var blob = new Blob([ics], {type:'text/calendar'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'staydalno_'+yr+'_'+mo+'.ics';
    a.click();
  }
}
function fmtD(d){
  var y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
  return y+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day;
}

// ── 시작 ──────────────────────────────────────────────────────────────────────
(function(){
  function init(){
    render(); initSwipe(); renderStats();
    // 저장된 URL 복원
    ['booking-1','booking-2','airbnb-1','airbnb-2'].forEach(function(k){
      if(icalUrls[k]){ var e=document.getElementById('url-'+k); if(e) e.value=icalUrls[k]; }
    });
    // Gist 설정 복원
    if(gistToken){ var gt=document.getElementById('gist-token-input'); if(gt) gt.value=gistToken; }
    var gu=document.getElementById('gist-url-disp');
    if(gu) gu.value='https://gist.githubusercontent.com/Project-Neo-Base/'+gistId+'/raw/dalno.ics';
    // URL 있으면 시작 시 즉시 fetch + 30분 자동 갱신
    if(icalUrls['booking-1']||icalUrls['booking-2']||icalUrls['airbnb-1']||icalUrls['airbnb-2']){
      autoRefreshAll();
      startAutoRefresh();
    }
    // Supabase에서 데이터 로드
    loadFromSupabase(function(){ render(); renderStats(); });
    // 30초마다 폴링 (두 번째 사용자 변경사항 반영)
    setInterval(function(){
      loadFromSupabase(function(){ render(); if(!selDate) renderStats(); });
    }, 30000);
  }
  if(document.readyState==='loading'){
    window.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
